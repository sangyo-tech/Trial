<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>確認テスト | 産業技術アカデミー</title>
<style>
:root{--bg:#0a0e1a;--card:rgba(255,255,255,0.04);--line:rgba(255,255,255,0.08);--gold:#f5c46b;--gold2:#c4a275;--text:#fff;--text2:#aaa;--text3:#666;--green:#7ed957;--red:#e85a5a}
*{box-sizing:border-box}
body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;line-height:1.6;font-size:14px}
.wrap{max-width:900px;margin:0 auto;padding:18px 16px}
.tabs{display:flex;gap:28px;border-bottom:1px solid var(--line);padding:0 4px;margin-bottom:18px}
.tab{padding:12px 0 14px;font-size:13px;font-weight:500;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border:none;font-family:inherit;line-height:1.6}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.active){color:rgba(255,255,255,.7)}
.section-label{color:var(--text2);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin:0 0 12px}
.section-label.gold{color:var(--gold);margin-top:18px}
.video-row{border:.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);border-radius:8px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;font-family:inherit;width:100%;text-align:left;color:var(--text);margin-bottom:6px;transition:background .15s,border-color .15s}
.video-row:hover:not(.disabled){background:rgba(245,196,107,.08);border-color:rgba(245,196,107,.4)}
.video-row.disabled{opacity:.45;cursor:not-allowed}
.video-num{color:var(--gold);font-size:12px;font-weight:500;min-width:28px;flex-shrink:0}
.video-title{color:var(--text);font-size:13px;flex:1;line-height:1.5}
.video-arrow{color:var(--gold);font-size:13px;flex-shrink:0;font-weight:500}
.video-row.disabled .video-arrow{color:var(--text3);font-size:11px}
.big-btn{display:inline-block;background:var(--gold);color:#1a1a1a;font-size:14px;font-weight:500;padding:12px 32px;border-radius:6px;border:none;margin-top:18px;cursor:pointer;font-family:inherit}
.big-btn:hover{background:#ffd485}
.center-card{padding:32px 4px 18px;text-align:center}
.center-card h3{color:var(--text);font-size:22px;font-weight:500;margin:0 0 4px}
.center-card .subtitle{color:var(--text2);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin:0 0 8px}
.center-card .desc{color:var(--text3);font-size:12px;margin:0}
.center-card .meta{color:var(--text3);font-size:11px;margin:18px 0 0}
.cat-grid{display:flex;flex-direction:column;gap:10px;margin:12px 0 18px}
.cat-card{background:linear-gradient(135deg,rgba(245,196,107,.06),rgba(255,255,255,.03));border:.5px solid rgba(255,255,255,.12);border-radius:10px;padding:18px 22px;color:var(--text);font-size:15px;cursor:pointer;text-align:left;font-family:inherit;display:flex;justify-content:space-between;align-items:center;gap:14px;width:100%;transition:background .18s,border-color .18s,transform .12s}
.cat-card:hover:not(.disabled){background:linear-gradient(135deg,rgba(245,196,107,.16),rgba(245,196,107,.06));border-color:rgba(245,196,107,.5);transform:translateY(-1px)}
.cat-card .cat-name{font-weight:500;letter-spacing:.02em}
.cat-card .cat-count{color:var(--gold);font-size:13px;font-weight:500;background:rgba(245,196,107,.08);padding:4px 10px;border-radius:999px;border:.5px solid rgba(245,196,107,.25);white-space:nowrap}
.cat-card .cat-arrow{color:var(--gold);font-size:14px;font-weight:500}
.cat-card.disabled{opacity:.4;cursor:not-allowed}
.cat-card.disabled .cat-count{background:rgba(255,255,255,.04);color:var(--text3);border-color:rgba(255,255,255,.08)}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:11px;color:var(--text2)}
.quiz-progress{color:var(--gold);font-weight:500;font-size:12px}
.quiz-bar{background:rgba(245,196,107,.1);border-radius:999px;height:4px;margin-bottom:20px;overflow:hidden}
.quiz-bar-fill{background:var(--gold);height:100%;width:0;border-radius:999px;transition:width .25s}
.quiz-q{color:var(--text);font-size:15px;font-weight:500;margin:0 0 16px;line-height:1.7}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.1);border-radius:6px;padding:12px 14px;color:#ddd;font-size:13px;cursor:pointer;line-height:1.5;text-align:left;font-family:inherit;width:100%}
.quiz-opt:hover:not(:disabled){background:rgba(255,255,255,.08)}
.quiz-opt.correct{background:rgba(126,217,87,.1);border-color:rgba(126,217,87,.5);color:#c5f0a8}
.quiz-opt.wrong{background:rgba(232,90,90,.1);border-color:rgba(232,90,90,.5);color:#f5b5b5}
.opt-label{color:var(--gold);margin-right:10px;font-weight:500}
.quiz-opt.correct .opt-label{color:var(--green)}
.quiz-opt.wrong .opt-label{color:var(--red)}
.quiz-explain{margin-top:14px;padding:12px 14px;background:rgba(245,196,107,.06);border-left:2px solid var(--gold);font-size:12px;color:#ddd;line-height:1.7;border-radius:4px}
.quiz-hint{margin-top:8px;font-size:12px;color:var(--text2)}
.quiz-hint summary{cursor:pointer;color:var(--gold)}
.quiz-actions{margin-top:18px;display:flex;gap:8px;justify-content:flex-end}
.btn{background:rgba(245,196,107,.15);border:.5px solid rgba(245,196,107,.4);color:var(--gold);font-size:13px;padding:8px 18px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:500}
.btn:hover{background:rgba(245,196,107,.25)}
.btn.primary{background:var(--gold);color:#1a1a1a;border-color:var(--gold)}
.btn.primary:hover{background:#ffd485}
.btn.ghost{background:transparent;color:var(--text2);border-color:var(--line)}
.btn.ghost:hover{color:var(--text)}
.result{text-align:center;padding:28px 8px}
.result .score{font-size:48px;font-weight:500;margin:8px 0}
.result .pass{color:var(--green)}
.result .fail{color:var(--red)}
.result .label-text{color:var(--text2);font-size:12px;letter-spacing:.1em;text-transform:uppercase}
.result-bar{display:flex;gap:6px;flex-wrap:wrap;margin:16px auto;max-width:560px;justify-content:center}
.result-dot{width:18px;height:18px;border-radius:4px;background:rgba(255,255,255,.1)}
.result-dot.ok{background:var(--green)}
.result-dot.ng{background:var(--red)}
.loading{text-align:center;color:var(--text2);padding:40px;font-size:13px}
.cert-form{padding:32px 16px;text-align:center}
.cert-form h3{color:var(--text);font-size:20px;font-weight:500;margin:0 0 8px}
.cert-form p{color:var(--text2);font-size:13px;margin:0 0 18px}
.cert-form input{font-family:inherit;font-size:16px;padding:10px 14px;background:rgba(255,255,255,.06);border:.5px solid rgba(245,196,107,.4);border-radius:6px;color:var(--text);width:280px;max-width:100%;text-align:center}
.cert-form input:focus{outline:none;border-color:var(--gold);background:rgba(245,196,107,.06)}
.cert-actions{margin-top:18px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.certificate{background:#fffaf0;color:#1a1a1a;padding:48px 36px;border:6px double #c4a275;border-radius:6px;margin:18px auto;max-width:720px;text-align:center;position:relative;box-shadow:0 4px 24px rgba(0,0,0,.4);font-family:"Times New Roman","YuMincho","Hiragino Mincho ProN",serif}
.certificate::before{content:"";position:absolute;top:14px;left:14px;right:14px;bottom:14px;border:1px solid #c4a275;pointer-events:none;border-radius:3px}
.cert-title{font-size:13px;letter-spacing:.5em;color:#7a5a1f;margin:0 0 4px;text-transform:uppercase;font-weight:600}
.cert-jp-title{font-size:36px;color:#3a2a0d;margin:8px 0 26px;letter-spacing:.15em;font-weight:600}
.cert-name-label{font-size:11px;color:#7a5a1f;letter-spacing:.3em;margin:0 0 4px}
.cert-name{font-size:30px;color:#1a1a1a;margin:0 0 6px;font-weight:600;border-bottom:1px solid #c4a275;display:inline-block;padding:0 24px 6px}
.cert-honor{font-size:11px;color:#7a5a1f;margin:0 0 22px}
.cert-body{font-size:14px;color:#3a2a0d;line-height:2;margin:18px 0}
.cert-body strong{color:#1a1a1a;font-size:15px}
.cert-score{font-size:13px;color:#5a4515;margin:6px 0 0}
.cert-foot{display:flex;justify-content:space-between;align-items:flex-end;margin-top:32px;font-size:11px;color:#7a5a1f}
.cert-date{text-align:left}
.cert-issuer{text-align:right}
.cert-issuer .org{font-size:14px;color:#1a1a1a;font-weight:600;margin-top:2px}
.cert-mark{position:absolute;right:42px;bottom:40px;width:64px;height:64px;border:2px solid #c4a275;border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(196,162,117,.08);font-size:9px;color:#7a5a1f;letter-spacing:.1em;line-height:1.2;text-align:center;font-weight:600}
@media print{
  body{background:#fff !important}
  .no-print{display:none !important}
  .certificate{box-shadow:none;margin:0;max-width:100%}
  .wrap{padding:0;max-width:100%}
}
@media(max-width:768px){.wrap{padding:14px 12px;max-width:100%}}
@media(max-width:600px){.wrap{padding:12px 10px}.tabs{gap:14px;padding:0 2px;margin-bottom:14px}.tab{font-size:12px;padding:10px 0 12px}.section-label{font-size:10px;margin-bottom:10px}.video-row{padding:11px 13px;gap:10px;border-radius:7px;margin-bottom:5px}.video-num{font-size:11px;min-width:22px}.video-title{font-size:12px;line-height:1.45}.video-arrow{font-size:11px}.cat-grid{gap:8px;margin:10px 0 14px}.cat-card{padding:14px 14px;font-size:13px;gap:10px;border-radius:9px}.cat-card .cat-name{font-size:13px;line-height:1.35}.cat-card .cat-count{font-size:11px;padding:3px 8px}.cat-card .cat-arrow{font-size:12px}.center-card{padding:24px 4px 14px}.center-card h3{font-size:18px}.center-card .desc{font-size:11px;line-height:1.6}.big-btn{font-size:13px;padding:11px 26px}.quiz-q{font-size:14px;line-height:1.6}.quiz-opt{font-size:12.5px;padding:11px 12px}.opt-label{margin-right:8px}.quiz-explain{font-size:11.5px;padding:10px 12px}.quiz-actions{flex-direction:column;gap:6px;align-items:stretch}.quiz-actions .btn{width:100%}.btn{font-size:12.5px;padding:9px 14px}.result{padding:22px 6px}.result .score{font-size:40px}.result-bar{gap:4px}.result-dot{width:14px;height:14px}.cert-form input{width:100%;font-size:15px}.cert-actions{flex-direction:column;gap:6px}.cert-actions .btn{width:100%}.cert-jp-title{font-size:26px;letter-spacing:.1em}.cert-name{font-size:20px;padding:0 16px 5px}.certificate{padding:26px 16px;margin:14px auto;border-width:4px}.certificate::before{top:10px;left:10px;right:10px;bottom:10px}.cert-body{font-size:13px;line-height:1.9}.cert-foot{flex-direction:column;align-items:flex-start;gap:14px;margin-top:24px}.cert-issuer{text-align:left}.cert-mark{position:static;margin:14px auto 0;width:54px;height:54px;font-size:8px}}
@media(max-width:380px){.tabs{gap:10px}.tab{font-size:11px}.video-row{padding:10px 11px;gap:8px}.video-num{min-width:20px;font-size:10px}.video-title{font-size:11.5px}.video-arrow{font-size:10px}.cat-card{padding:12px 12px;gap:8px}.cat-card .cat-name{font-size:12.5px}.center-card h3{font-size:16px}.cert-jp-title{font-size:22px}.cert-name{font-size:18px}.certificate{padding:22px 12px}}
</style>
</head>
<body>
<div class="wrap" id="root"><div class="loading">読み込み中…</div></div>
<script>
(function(){
"use strict";
var params = new URLSearchParams(location.search);
var courseSlug = 'iso22000';
var root = document.getElementById('root');
var DATA = null;
var STATE = { mode: 'menu', tab: 'course', quiz: null, result: null, certName: '' };

function escapeHTML(s){return String(s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]});}
function pickRandom(arr,n){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a.slice(0,Math.min(n,a.length));}
function postHeight(){try{var h=document.documentElement.scrollHeight;if(window.parent)window.parent.postMessage({qh:h},'*');}catch(e){}}
function todayJP(){var d=new Date();return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';}

var THEME_REGEX={'theme-fmea':/FMEA|設計審査|DR|源流|信頼性|予防保全/i,'theme-claim':/クレーム|苦情|是正|原因解析|再発防止|8D|A3|なぜなぜ/i,'theme-4m':/4M|変化点|変更|ECN|MOC|初期流動/i,'theme-qms':/QMS|品質マネジメント|品質方針|文書体系|コミットメント|主任|マネジメントレビュー/i,'theme-stats':/統計|データ分析|Cp|Cpk|代表値|ヒストグラム|箱ひげ|サンプル数|ピボット|相関|回帰|仮説検定|バラつき/i,'theme-qc7':/QC七|特性要因|パレート|チェックシート|層別|魚の骨|管理図|散布図/i,'theme-supplier':/サプライヤ|調達|下請|外注|受入検査|購買/i,'theme-kpi':/KPI|コスト|予防コスト|評価コスト|失敗コスト|品質コスト|原価|指標|PAF/i,'theme-risk':/リスク|アセスメント|HACCP|危険/i,'theme-tps':/トヨタ|TPS|ジャストインタイム|JIT|かんばん|自働化|平準化|タクト|レイアウト|セル|一個流|ポカヨケ|フールプルーフ|フェールセーフ/i,'theme-standard':/標準化|標準作業|マニュアル|手順書|文書|フォーマット/i,'theme-dx':/DX|デジタル|eQMS|ピボットテーブル|AI|RPA|IoT|データ活用|BI/i,'theme-inspection':/検査|計測|校正|測定|Gage|抜き取り|含量|証明|保証|トレーサビリティ|MSA/i,'short-fmea':/FMEA|設計審査|DR|源流|信頼性|予防保全/i,'short-claim':/クレーム|苦情|是正|原因解析|再発防止|8D|A3|なぜなぜ/i,'short-4m':/4M|変化点|変更|ECN|MOC|初期流動/i,'short-kpi':/KPI|コスト|予防コスト|評価コスト|失敗コスト|品質コスト|原価|指標|PAF/i,'short-audit':/監査|内部監査|外部監査|顧客監査|是正|是正処置|不適合/i};var SOURCES=['chuukyuu','shokyuu','jissen','kyouyou','theme-qc7','theme-stats','theme-inspection','theme-qms','theme-4m','theme-claim','theme-kpi','theme-risk','theme-supplier','theme-tps','theme-standard','theme-dx','theme-fmea','iso9001','iso13485','iso14001','iso22000','iso22716','iso16949','kenko-gmp','gqp','gvp','yakkihou','industry-auto','industry-cosmetics','industry-food','industry-medical'];var CAT_SOURCES={'レベル別コース':['kyouyou','shokyuu','chuukyuu','jissen'],'基礎・入門':['kyouyou','shokyuu'],'QC・統計・検査':['theme-qc7','theme-stats','theme-inspection'],'マネジメント・管理':['theme-qms','theme-4m','theme-claim','theme-kpi','theme-risk','theme-supplier','theme-tps','theme-standard','theme-dx'],'専門・業界特化':['iso9001','iso13485','iso14001','iso22000','iso22716','iso16949','kenko-gmp','gqp','gvp','yakkihou','industry-auto','industry-cosmetics','industry-food','industry-medical'],'テーマ横断コース':['theme-fmea','theme-claim','theme-4m','theme-qms','theme-stats','theme-qc7','theme-supplier','theme-kpi','theme-risk','theme-tps','theme-standard','theme-dx','theme-inspection']};Promise.all([fetch(courseSlug+'.json?v='+Date.now()).then(function(r){return r.json()})].concat(SOURCES.map(function(s){return fetch(s+'.json?v='+Date.now()).then(function(r){return r.json()}).catch(function(){return{}})}))).then(function(results){var d=results[0];var srcArr=results.slice(1);var srcMap={};SOURCES.forEach(function(s,i){srcMap[s]=srcArr[i]||{}});var videoSrcs=['chuukyuu','shokyuu','jissen','kyouyou'];var re=THEME_REGEX[courseSlug];if(re&&(!d.videos||!d.videos.length)){var allVids=[];videoSrcs.forEach(function(s){(srcMap[s].videos||[]).forEach(function(v){if(re.test(v.title))allVids.push(v)})});d.videos=allVids;}if(!d.categories||!Object.keys(d.categories).length){var cats={};Object.keys(CAT_SOURCES).forEach(function(cat){var qs=[];CAT_SOURCES[cat].forEach(function(s){var j=srcMap[s]||{};(j.courseQuestions||[]).forEach(function(q){qs.push(q)});(j.videos||[]).forEach(function(v){(v.questions||[]).forEach(function(q){qs.push(q)})})});cats[cat]=qs});d.categories=cats;}DATA=d;if(!DATA.videos||!DATA.videos.length)STATE.tab='course';else STATE.tab='video';render();}).catch(function(e){root.innerHTML='<div class="loading">クイズデータの読込に失敗しました（'+e+'）</div>';});

function render(){
  if(STATE.mode==='quiz')return renderQuiz();
  if(STATE.mode==='result')return renderResult();
  if(STATE.mode==='cert-form')return renderCertForm();
  if(STATE.mode==='certificate')return renderCertificate();
  return renderMenu();
}
function renderMenu(){
  var html=''
    +'<div class="tabs">'
    +'<button class="tab'+(STATE.tab==='video'?' active':'')+'" data-tab="video">動画別</button>'
    +'<button class="tab'+(STATE.tab==='course'?' active':'')+'" data-tab="course">コース別</button>'
    +'<button class="tab'+(STATE.tab==='category'?' active':'')+'" data-tab="category">カテゴリー別</button>'
    +'</div>';
  if(STATE.tab==='video')html+=renderVideoTab();
  else if(STATE.tab==='course')html+=renderCourseTab();
  else html+=renderCategoryTab();
  root.innerHTML=html;
  bindMenu();
  postHeight();
}
function bindMenu(){
  Array.prototype.forEach.call(root.querySelectorAll('.tab'),function(b){b.addEventListener('click',function(){STATE.tab=b.dataset.tab;render();});});
  Array.prototype.forEach.call(root.querySelectorAll('[data-action]'),function(b){b.addEventListener('click',function(){
    var act=b.dataset.action;
    if(act==='video'){
      var idx=parseInt(b.dataset.video,10);
      var v=DATA.videos[idx];
      if(!v||!v.questions||!v.questions.length){alert('問題が追加予定です');return;}
      startQuiz(pickRandom(v.questions,5),v.title,'video');
    }else if(act==='course'){
      if(!DATA.courseQuestions||!DATA.courseQuestions.length){alert('問題が追加予定です');return;}
      startQuiz(pickRandom(DATA.courseQuestions,Math.min(20,DATA.courseQuestions.length)),DATA.courseName+' 総合','course');
    }else if(act==='category'){
      var cat=b.dataset.cat;
      var pool=DATA.categories&&DATA.categories[cat];
      if(!pool||!pool.length){alert('カテゴリの問題が追加予定です');return;}
      startQuiz(pickRandom(pool,Math.min(50,pool.length)),cat+' カテゴリ','category');
    }
  });});
}
function renderVideoTab(){
  var vids=DATA.videos||[];
  if(vids.length===0)return '<div class="center-card"><p class="subtitle">追加予定</p><p class="desc">動画別テストは現在追加予定です</p></div>';
  var html='<p class="section-label">'+escapeHTML(DATA.courseName)+' · 動画ごとに5問</p>';
  if(DATA.videoGroups&&DATA.videoGroups.length){
    DATA.videoGroups.forEach(function(g){
      html+='<p class="section-label gold">— '+escapeHTML(g.name)+' —</p>';
      g.indices.forEach(function(vi){html+=videoRowHTML(vids[vi],vi);});
    });
  }else{
    vids.forEach(function(v,i){html+=videoRowHTML(v,i);});
  }
  return html;
}
function videoRowHTML(v,idx){
  if(!v)return '';
  var num=String(idx+1).padStart(2,'0');
  var hasQ=v.questions&&v.questions.length>0;
  if(hasQ){
    return '<button class="video-row" data-action="video" data-video="'+idx+'">'
      +'<span class="video-num">'+num+'</span>'
      +'<span class="video-title">'+escapeHTML(v.title)+'</span>'
      +'<span class="video-arrow">5問 開始 →</span>'
      +'</button>';
  }
  return '<div class="video-row disabled">'
    +'<span class="video-num">'+num+'</span>'
    +'<span class="video-title">'+escapeHTML(v.title)+'</span>'
    +'<span class="video-arrow">追加予定</span>'
    +'</div>';
}
function renderCourseTab(){
  var n=(DATA.courseQuestions||[]).length;
  if(n===0)return '<div class="center-card"><p class="subtitle">追加予定</p><p class="desc">このコースの総合テストは現在追加予定です</p></div>';
  return '<div class="center-card">'
    +'<p class="subtitle">'+escapeHTML(DATA.courseName)+' 総合確認テスト</p>'
    +'<h3>20問</h3>'
    +'<p class="desc">コース全体からランダム出題 · 解説付き · 合格基準80% · 修了証発行</p>'
    +'<button class="big-btn" data-action="course">テストを始める →</button>'
    +'<p class="meta">想定所要時間：約10分</p>'
    +'</div>';
}
function renderCategoryTab(){
  var cats=DATA.categories||{};
  var names=Object.keys(cats);
  if(names.length===0)return '<div class="center-card"><p class="subtitle">追加予定</p><p class="desc">カテゴリ別テストは現在追加予定です</p></div>';
  var html='<p class="section-label">カテゴリから選択 · 各50問ランダム · 合格基準80% · 修了証発行</p><div class="cat-grid">';
  names.forEach(function(n){
    var count=(cats[n]||[]).length;
    var disabled=count===0;
    html+='<button class="cat-card'+(disabled?' disabled':'')+'" data-action="category" data-cat="'+escapeHTML(n)+'"'+(disabled?' disabled':'')+'>'
      +'<span class="cat-name">'+escapeHTML(n)+'</span>'
      +'<span class="cat-count">'+(disabled?'追加予定':count+'問')+'</span>'
      +'<span class="cat-arrow">→</span>'
      +'</button>';
  });
  html+='</div>';
  return html;
}

function startQuiz(questions,label,kind){
  STATE.mode='quiz';
  STATE.quiz={questions:questions,index:0,answers:[],label:label,kind:kind};
  render();
}
function renderQuiz(){
  var q=STATE.quiz.questions[STATE.quiz.index];
  var total=STATE.quiz.questions.length;
  var idx=STATE.quiz.index;
  var ans=STATE.quiz.answers[idx];
  var showResult=ans!==undefined;
  var html='<div class="quiz-header">'
    +'<span>'+escapeHTML(STATE.quiz.label)+'</span>'
    +'<span class="quiz-progress">'+(idx+1)+' / '+total+'</span>'
    +'</div>'
    +'<div class="quiz-bar"><div class="quiz-bar-fill" style="width:'+Math.round((idx+(showResult?1:0))/total*100)+'%"></div></div>'
    +'<p class="quiz-q">'+escapeHTML(q.question)+'</p>';
  if(q.hint&&!showResult)html+='<details class="quiz-hint"><summary>ヒントを見る</summary><div style="margin-top:6px">'+escapeHTML(q.hint)+'</div></details>';
  html+='<div class="quiz-options">';
  q.options.forEach(function(opt,i){
    var cls='quiz-opt';
    if(showResult){
      if(i===q.correct)cls+=' correct';
      else if(i===ans)cls+=' wrong';
    }
    var lbl=String.fromCharCode(65+i);
    html+='<button class="'+cls+'" data-i="'+i+'"'+(showResult?' disabled':'')+'><span class="opt-label">'+lbl+'</span>'+escapeHTML(opt)+'</button>';
  });
  html+='</div>';
  if(showResult){
    if(q.explanation)html+='<div class="quiz-explain">'+escapeHTML(q.explanation)+'</div>';
    html+='<div class="quiz-actions">'
      +(idx+1<total?'<button class="btn primary" data-act="next">次の問題へ →</button>':'<button class="btn primary" data-act="finish">結果を見る →</button>')
      +'</div>';
  }
  root.innerHTML=html;
  Array.prototype.forEach.call(root.querySelectorAll('.quiz-opt:not([disabled])'),function(b){b.addEventListener('click',function(){
    STATE.quiz.answers[idx]=parseInt(b.dataset.i,10);render();
  });});
  Array.prototype.forEach.call(root.querySelectorAll('[data-act]'),function(b){b.addEventListener('click',function(){
    if(b.dataset.act==='next'){STATE.quiz.index++;render();}
    else if(b.dataset.act==='finish'){
      STATE.result={questions:STATE.quiz.questions,answers:STATE.quiz.answers,label:STATE.quiz.label,kind:STATE.quiz.kind};
      STATE.mode='result';STATE.quiz=null;render();
    }
  });});
  postHeight();
}
function renderResult(){
  var r=STATE.result;
  var total=r.questions.length;
  var correct=r.answers.filter(function(a,i){return a===r.questions[i].correct;}).length;
  var pct=Math.round(correct/total*100);
  var passed=pct>=80;
  var canIssueCert=passed&&(r.kind==='course'||r.kind==='category');
  var dots='';
  r.questions.forEach(function(q,i){
    var ok=r.answers[i]===q.correct;
    dots+='<div class="result-dot '+(ok?'ok':'ng')+'"></div>';
  });
  var btns='';
  if(canIssueCert)btns+='<button class="btn primary" data-act="cert">修了証を発行する →</button>';
  btns+='<button class="btn'+(canIssueCert?'':' primary')+'" data-act="retry">もう一度受ける</button>';
  btns+='<button class="btn ghost" data-act="back">戻る</button>';
  root.innerHTML='<div class="result">'
    +'<p class="label-text">'+escapeHTML(r.label)+'</p>'
    +'<div class="score '+(passed?'pass':'fail')+'">'+pct+'%</div>'
    +'<p style="color:var(--text2);font-size:13px;margin:0 0 4px">正解 '+correct+' / '+total+' 問</p>'
    +'<p style="color:'+(passed?'var(--green)':'var(--red)')+';font-size:14px;font-weight:500">'+(passed?'合格 (基準80%以上)':'不合格 (基準80%以上)')+'</p>'
    +'<div class="result-bar">'+dots+'</div>'
    +'<div style="margin-top:24px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'+btns+'</div>'
    +'</div>';
  Array.prototype.forEach.call(root.querySelectorAll('[data-act]'),function(b){b.addEventListener('click',function(){
    if(b.dataset.act==='retry'){
      STATE.mode='quiz';
      STATE.quiz={questions:r.questions,index:0,answers:[],label:r.label,kind:r.kind};
      STATE.result=null;
      render();
    }else if(b.dataset.act==='back'){
      STATE.mode='menu';STATE.result=null;render();
    }else if(b.dataset.act==='cert'){
      STATE.mode='cert-form';render();
    }
  });});
  postHeight();
}
function renderCertForm(){
  root.innerHTML='<div class="cert-form">'
    +'<h3>修了証を発行する</h3>'
    +'<p>修了証に記載するお名前を入力してください</p>'
    +'<input type="text" id="certNameInput" placeholder="例：山田 太郎" value="'+escapeHTML(STATE.certName||'')+'" maxlength="40">'
    +'<div class="cert-actions">'
    +'<button class="btn primary" data-act="issue">発行する →</button>'
    +'<button class="btn ghost" data-act="back">戻る</button>'
    +'</div>'
    +'</div>';
  var input=root.querySelector('#certNameInput');
  if(input){input.focus();input.addEventListener('keydown',function(e){if(e.key==='Enter')issue();});}
  function issue(){
    var name=(input.value||'').trim();
    if(!name){alert('お名前を入力してください');return;}
    STATE.certName=name;STATE.mode='certificate';render();
  }
  Array.prototype.forEach.call(root.querySelectorAll('[data-act]'),function(b){b.addEventListener('click',function(){
    if(b.dataset.act==='issue')issue();
    else if(b.dataset.act==='back'){STATE.mode='result';render();}
  });});
  postHeight();
}
function renderCertificate(){
  var r=STATE.result;
  var total=r.questions.length;
  var correct=r.answers.filter(function(a,i){return a===r.questions[i].correct;}).length;
  var pct=Math.round(correct/total*100);
  var courseTitle=DATA.courseName;
  var label=r.label;
  root.innerHTML='<div class="no-print" style="text-align:center;margin-bottom:14px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">'
    +'<button class="btn primary" data-act="print">印刷 / PDF保存</button>'
    +'<button class="btn ghost" data-act="back">結果に戻る</button>'
    +'</div>'
    +'<div class="certificate">'
    +'<p class="cert-title">Certificate of Completion</p>'
    +'<h2 class="cert-jp-title">修　了　証</h2>'
    +'<p class="cert-name-label">受講者名</p>'
    +'<p class="cert-name">'+escapeHTML(STATE.certName)+'</p>'
    +'<p class="cert-honor">殿</p>'
    +'<p class="cert-body">あなたは産業技術アカデミーが定める<br><strong>「'+escapeHTML(label)+'」</strong> 確認テストにおいて<br>合格基準（80%以上）を達成され、所定の修了要件を満たされました。<br>ここに修了されたことを認定します。</p>'
    +'<p class="cert-score">スコア：'+correct+' / '+total+' 問正解（'+pct+'%）</p>'
    +'<div class="cert-foot">'
    +'<div class="cert-date">発行日<br><strong style="color:#1a1a1a;font-size:14px">'+todayJP()+'</strong></div>'
    +'<div class="cert-issuer">発行<div class="org">産業技術アカデミー</div><div style="font-size:10px">Qulio合同会社</div></div>'
    +'</div>'
    +'<div class="cert-mark">産業技術<br>アカデミー<br>認定</div>'
    +'</div>';
  Array.prototype.forEach.call(root.querySelectorAll('[data-act]'),function(b){b.addEventListener('click',function(){
    if(b.dataset.act==='print')window.print();
    else if(b.dataset.act==='back'){STATE.mode='result';render();}
  });});
  postHeight();
}
window.addEventListener('resize',postHeight);
})();
</script>
</body>
</html>
