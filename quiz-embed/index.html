<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>確認テストへ進む</title><meta name="robots" content="noindex"><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet"><style>:root{--bg-primary:#0a0f1a;--bg-card:#111827;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--accent-gold:#d4a017;--accent-green:#22c55e;--border:#1e293b}*{box-sizing:border-box;margin:0;padding:0}html,body{background:var(--bg-primary);color:var(--text-primary);font-family:'Noto Sans JP',sans-serif;line-height:1.7;overflow-x:hidden}body{padding:24px 16px}.container{max-width:880px;margin:0 auto}.quiz-prompt{background:linear-gradient(135deg,rgba(34,197,94,0.08) 0%,rgba(212,160,23,0.06) 100%);border:1px solid rgba(34,197,94,0.3);border-radius:14px;padding:28px 32px;text-align:center}.badge{display:inline-block;background:var(--accent-green);color:var(--bg-primary);padding:4px 14px;border-radius:999px;font-size:12px;font-weight:700;margin-bottom:12px}.quiz-prompt h2{font-family:'Noto Serif JP',serif;font-size:24px;font-weight:700;margin-bottom:10px}.quiz-prompt p{color:var(--text-secondary);font-size:14.5px;margin-bottom:18px}.btn-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 22px;border-radius:10px;text-decoration:none;font-weight:700;font-size:15px;transition:transform 0.15s}.btn:hover{transform:translateY(-2px)}.btn-primary{background:var(--accent-gold);color:var(--bg-primary)}.btn-secondary{background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border)}.tip{color:var(--text-secondary);font-size:13px;text-align:center;margin-top:14px}.tip strong{color:var(--accent-gold);font-weight:700}@media(max-width:540px){.quiz-prompt{padding:22px 18px}.quiz-prompt h2{font-size:19px}.btn{font-size:14px;padding:11px 18px}}</style></head><body><div class="container"><div class="quiz-prompt"><div class="badge">CHECK</div><h2>動画はいかがでしたか？確認テストで定着度をチェック</h2><p>視聴した内容を確認テストで振り返ると、理解の定着度がぐっと上がります。<br>3つの確認テストをご用意しています — 動画ごと∕コース別∕カテゴリー別。</p><div class="btn-row"><a class="btn btn-primary" href="https://quiz.sangyo-tech.jp/" target="_top">▶ 動画別 確認テスト</a><a class="btn btn-secondary" href="https://course-quiz.sangyo-tech.jp/" target="_top">コース別 確認テスト</a><a class="btn btn-secondary" href="https://category-quiz.sangyo-tech.jp/" target="_top">カテゴリー別 確認テスト</a></div><div class="tip"><strong>こちらがおすすめ ：</strong>動画視聴 → 動画別テストで即時振り返り → コース修了後にコース別 → 全体把握にカテゴリー別</div></div></div></body></html>
