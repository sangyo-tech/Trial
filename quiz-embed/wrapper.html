<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex,nofollow">
<title>確認テスト | 産業技術アカデミー</title>
<style>
:root{--bg:#0a0e1a;--card:rgba(255,255,255,0.04);--line:rgba(255,255,255,0.08);--gold:#f5c46b;--gold2:#c4a275;--text:#fff;--text2:#aaa;--text3:#666;--green:#7ed957;--red:#e85a5a}
*{box-sizing:border-box}
body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN",Meiryo,sans-serif;line-height:1.6;font-size:14px}
.wrap{max-width:900px;margin:0 auto;padding:18px 16px}
.tabs{display:flex;gap:28px;border-bottom:1px solid var(--line);padding:0 4px;margin-bottom:18px}
.tab{padding:12px 0 14px;font-size:13px;font-weight:500;color:rgba(255,255,255,.4);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border:none;font-family:inherit;line-height:1.6}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab:hover:not(.active){color:rgba(255,255,255,.7)}
.section-label{color:var(--text2);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin:0 0 12px}
.section-label.gold{color:var(--gold);margin-top:18px}
.video-row{border-bottom:.5px solid rgba(255,255,255,.06);padding:14px 0;display:flex;align-items:center;gap:14px}
.video-num{color:var(--gold);font-size:12px;font-weight:500;min-width:28px;flex-shrink:0}
.video-title{color:var(--text);font-size:13px;flex:1;line-height:1.5}
.start-btn{background:rgba(245,196,107,.15);border:.5px solid rgba(245,196,107,.4);color:var(--gold);font-size:11px;padding:5px 11px;border-radius:4px;font-weight:500;cursor:pointer;font-family:inherit;flex-shrink:0;white-space:nowrap}
.start-btn:hover{background:rgba(245,196,107,.25)}
.start-btn.disabled{opacity:.4;cursor:not-allowed;background:rgba(255,255,255,.04);border-color:var(--line);color:var(--text3)}
.big-btn{display:inline-block;background:var(--gold);color:#1a1a1a;font-size:14px;font-weight:500;padding:12px 32px;border-radius:6px;border:none;margin-top:18px;cursor:pointer;font-family:inherit}
.big-btn:hover{background:#ffd485}
.center-card{padding:32px 4px 18px;text-align:center}
.center-card h3{color:var(--text);font-size:22px;font-weight:500;margin:0 0 4px}
.center-card .subtitle{color:var(--text2);font-size:11px;letter-spacing:.1em;text-transform:uppercase;margin:0 0 8px}
.center-card .desc{color:var(--text3);font-size:12px;margin:0}
.center-card .meta{color:var(--text3);font-size:11px;margin:18px 0 0}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:8px;margin:8px 0 12px}
.cat-card{background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.1);border-radius:8px;padding:11px 13px;color:var(--text);font-size:13px;cursor:pointer;text-align:left;font-family:inherit;display:flex;justify-content:space-between;align-items:center;gap:8px}
.cat-card:hover{background:rgba(245,196,107,.08);border-color:rgba(245,196,107,.4)}
.cat-card .cat-count{color:var(--text3);font-size:11px}
.cat-card.disabled{opacity:.4;cursor:not-allowed}
.quiz-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;font-size:11px;color:var(--text2)}
.quiz-progress{color:var(--gold);font-weight:500;font-size:12px}
.quiz-bar{background:rgba(245,196,107,.1);border-radius:999px;height:4px;margin-bottom:20px;overflow:hidden}
.quiz-bar-fill{background:var(--gold);height:100%;width:0;border-radius:999px;transition:width .25s}
.quiz-q{color:var(--text);font-size:15px;font-weight:500;margin:0 0 16px;line-height:1.7}
.quiz-options{display:flex;flex-direction:column;gap:8px}
.quiz-opt{background:rgba(255,255,255,.04);border:.5px solid rgba(255,255,255,.1);border-radius:6px;padding:12px 14px;color:#ddd;font-size:13px;cursor:pointer;line-height:1.5;text-align:left;font-family:inherit;width:100%}
.quiz-opt:hover:not(:disabled){background:rgba(255,255,255,.08)}
.quiz-opt.correct{background:rgba(126,217,87,.1);border-color:rgba(126,217,87,.5);color:#c5f0a8}
.quiz-opt.wrong{background:rgba(232,90,90,.1);border-color:rgba(232,90,90,.5);color:#f5b5b5}
.opt-label{color:var(--gold);margin-right:10px;font-weight:500}
.quiz-opt.correct .opt-label{color:var(--green)}
.quiz-opt.wrong .opt-label{color:var(--red)}
.quiz-explain{margin-top:14px;padding:12px 14px;background:rgba(245,196,107,.06);border-left:2px solid var(--gold);font-size:12px;color:#ddd;line-height:1.7;border-radius:4px}
.quiz-hint{margin-top:8px;font-size:12px;color:var(--text2)}
.quiz-hint summary{cursor:pointer;color:var(--gold)}
.quiz-actions{margin-top:18px;display:flex;gap:8px;justify-content:flex-end}
.btn{background:rgba(245,196,107,.15);border:.5px solid rgba(245,196,107,.4);color:var(--gold);font-size:13px;padding:8px 18px;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:500}
.btn:hover{background:rgba(245,196,107,.25)}
.btn.primary{background:var(--gold);color:#1a1a1a;border-color:var(--gold)}
.btn.primary:hover{background:#ffd485}
.btn.ghost{background:transparent;color:var(--text2);border-color:var(--line)}
.btn.ghost:hover{color:var(--text)}
.result{text-align:center;padding:28px 8px}
.result .score{font-size:48px;font-weight:500;margin:8px 0}
.result .pass{color:var(--green)}
.result .fail{color:var(--red)}
.result .label-text{color:var(--text2);font-size:12px;letter-spacing:.1em;text-transform:uppercase}
.result-bar{display:flex;gap:6px;flex-wrap:wrap;margin:16px auto;max-width:560px;justify-content:center}
.result-dot{width:18px;height:18px;border-radius:4px;background:rgba(255,255,255,.1)}
.result-dot.ok{background:var(--green)}
.result-dot.ng{background:var(--red)}
.loading{text-align:center;color:var(--text2);padding:40px;font-size:13px}
@media(max-width:600px){.tabs{gap:18px}.tab{font-size:12px;padding:10px 0 12px}.center-card h3{font-size:18px}.quiz-q{font-size:14px}}
</style>
</head>
<body>
<div class="wrap" id="root"><div class="loading">読み込み中…</div></div>
<script>
(function(){
"use strict";
var params = new URLSearchParams(location.search);
var courseSlug = params.get('course') || 'kyouyou';
var root = document.getElementById('root');
var DATA = null;
var STATE = { mode: 'menu', tab: 'video', quiz: null, result: null };

function escapeHTML(s){return String(s).replace(/[&<>"']/g,function(c){return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]});}
function pickRandom(arr,n){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a.slice(0,Math.min(n,a.length));}
function postHeight(){try{var h=document.documentElement.scrollHeight;if(window.parent)window.parent.postMessage({qh:h},'*');}catch(e){}}

fetch('data/'+courseSlug+'.json?v='+Date.now()).then(function(r){if(!r.ok)throw r.status;return r.json();}).then(function(d){DATA=d;render();}).catch(function(e){root.innerHTML='<div class="loading">クイズデータの読込に失敗しました（'+e+'）</div>';});

function render(){
  if(STATE.mode==='quiz')return renderQuiz();
  if(STATE.mode==='result')return renderResult();
  return renderMenu();
}
function renderMenu(){
  var html=''
    +'<div class="tabs">'
    +'<button class="tab'+(STATE.tab==='video'?' active':'')+'" data-tab="video">動画別</button>'
    +'<button class="tab'+(STATE.tab==='course'?' active':'')+'" data-tab="course">コース別</button>'
    +'<button class="tab'+(STATE.tab==='category'?' active':'')+'" data-tab="category">カテゴリー別</button>'
    +'</div>';
  if(STATE.tab==='video')html+=renderVideoTab();
  else if(STATE.tab==='course')html+=renderCourseTab();
  else html+=renderCategoryTab();
  root.innerHTML=html;
  bindMenu();
  postHeight();
}
function bindMenu(){
  Array.prototype.forEach.call(root.querySelectorAll('.tab'),function(b){b.addEventListener('click',function(){STATE.tab=b.dataset.tab;render();});});
  Array.prototype.forEach.call(root.querySelectorAll('[data-action]'),function(b){b.addEventListener('click',function(){
    var act=b.dataset.action;
    if(act==='video'){
      var idx=parseInt(b.dataset.video,10);
      var v=DATA.videos[idx];
      if(!v||!v.questions||!v.questions.length){alert('問題が準備中です');return;}
      startQuiz(pickRandom(v.questions,5),v.title);
    }else if(act==='course'){
      if(!DATA.courseQuestions||!DATA.courseQuestions.length){alert('問題が準備中です');return;}
      startQuiz(pickRandom(DATA.courseQuestions,Math.min(20,DATA.courseQuestions.length)),DATA.courseName+' 総合');
    }else if(act==='category'){
      var cat=b.dataset.cat;
      var pool=DATA.categories&&DATA.categories[cat];
      if(!pool||!pool.length){alert('カテゴリの問題が準備中です');return;}
      startQuiz(pickRandom(pool,Math.min(50,pool.length)),cat);
    }
  });});
}
function renderVideoTab(){
  var vids=DATA.videos||[];
  var html='<p class="section-label">'+escapeHTML(DATA.courseName)+' · 動画ごとに5問</p>';
  if(DATA.videoGroups&&DATA.videoGroups.length){
    DATA.videoGroups.forEach(function(g){
      html+='<p class="section-label gold">— '+escapeHTML(g.name)+' —</p>';
      g.indices.forEach(function(vi){html+=videoRowHTML(vids[vi],vi);});
    });
  }else{
    vids.forEach(function(v,i){html+=videoRowHTML(v,i);});
  }
  return html;
}
function videoRowHTML(v,idx){
  if(!v)return '';
  var num=String(idx+1).padStart(2,'0');
  var hasQ=v.questions&&v.questions.length>0;
  return '<div class="video-row">'
    +'<span class="video-num">'+num+'</span>'
    +'<span class="video-title">'+escapeHTML(v.title)+'</span>'
    +(hasQ
      ?'<button class="start-btn" data-action="video" data-video="'+idx+'">5問 開始 →</button>'
      :'<span class="start-btn disabled">準備中</span>')
    +'</div>';
}
function renderCourseTab(){
  var n=(DATA.courseQuestions||[]).length;
  if(n===0)return '<div class="center-card"><p class="subtitle">準備中</p><p class="desc">このコースの総合テストは現在準備中です</p></div>';
  return '<div class="center-card">'
    +'<p class="subtitle">'+escapeHTML(DATA.courseName)+' 総合確認テスト</p>'
    +'<h3>20問</h3>'
    +'<p class="desc">コース全体からランダム出題 · 解説付き · 合格基準80%</p>'
    +'<button class="big-btn" data-action="course">テストを始める →</button>'
    +'<p class="meta">想定所要時間：約10分</p>'
    +'</div>';
}
function renderCategoryTab(){
  var cats=DATA.categories||{};
  var names=Object.keys(cats);
  if(names.length===0)return '<div class="center-card"><p class="subtitle">準備中</p><p class="desc">カテゴリ別テストは現在準備中です</p></div>';
  var html='<p class="section-label">カテゴリから選択 · 各50問ランダム · 合格基準80%</p><div class="cat-grid">';
  names.forEach(function(n){
    var count=(cats[n]||[]).length;
    var disabled=count===0;
    html+='<button class="cat-card'+(disabled?' disabled':'')+'" data-action="category" data-cat="'+escapeHTML(n)+'"'+(disabled?' disabled':'')+'>'
      +'<span>'+escapeHTML(n)+'</span>'
      +'<span class="cat-count">'+(disabled?'準備中':count+'問')+'</span>'
      +'</button>';
  });
  html+='</div>';
  return html;
}

function startQuiz(questions,label){
  STATE.mode='quiz';
  STATE.quiz={questions:questions,index:0,answers:[],label:label};
  render();
}
function renderQuiz(){
  var q=STATE.quiz.questions[STATE.quiz.index];
  var total=STATE.quiz.questions.length;
  var idx=STATE.quiz.index;
  var ans=STATE.quiz.answers[idx];
  var showResult=ans!==undefined;
  var html='<div class="quiz-header">'
    +'<span>'+escapeHTML(STATE.quiz.label)+'</span>'
    +'<span class="quiz-progress">'+(idx+1)+' / '+total+'</span>'
    +'</div>'
    +'<div class="quiz-bar"><div class="quiz-bar-fill" style="width:'+Math.round((idx+(showResult?1:0))/total*100)+'%"></div></div>'
    +'<p class="quiz-q">'+escapeHTML(q.question)+'</p>';
  if(q.hint&&!showResult)html+='<details class="quiz-hint"><summary>ヒントを見る</summary><div style="margin-top:6px">'+escapeHTML(q.hint)+'</div></details>';
  html+='<div class="quiz-options">';
  q.options.forEach(function(opt,i){
    var cls='quiz-opt';
    if(showResult){
      if(i===q.correct)cls+=' correct';
      else if(i===ans)cls+=' wrong';
    }
    var lbl=String.fromCharCode(65+i);
    html+='<button class="'+cls+'" data-i="'+i+'"'+(showResult?' disabled':'')+'><span class="opt-label">'+lbl+'</span>'+escapeHTML(opt)+'</button>';
  });
  html+='</div>';
  if(showResult){
    if(q.explanation)html+='<div class="quiz-explain">'+escapeHTML(q.explanation)+'</div>';
    html+='<div class="quiz-actions">'
      +(idx+1<total
        ?'<button class="btn primary" data-act="next">次の問題へ →</button>'
        :'<button class="btn primary" data-act="finish">結果を見る →</button>')
      +'</div>';
  }
  root.innerHTML=html;
  Array.prototype.forEach.call(root.querySelectorAll('.quiz-opt:not([disabled])'),function(b){b.addEventListener('click',function(){
    STATE.quiz.answers[idx]=parseInt(b.dataset.i,10);render();
  });});
  Array.prototype.forEach.call(root.querySelectorAll('[data-act]'),function(b){b.addEventListener('click',function(){
    if(b.dataset.act==='next'){STATE.quiz.index++;render();}
    else if(b.dataset.act==='finish'){
      STATE.result={questions:STATE.quiz.questions,answers:STATE.quiz.answers,label:STATE.quiz.label};
      STATE.mode='result';STATE.quiz=null;render();
    }
  });});
  postHeight();
}
function renderResult(){
  var r=STATE.result;
  var total=r.questions.length;
  var correct=r.answers.filter(function(a,i){return a===r.questions[i].correct;}).length;
  var pct=Math.round(correct/total*100);
  var passed=pct>=80;
  var dots='';
  r.questions.forEach(function(q,i){
    var ok=r.answers[i]===q.correct;
    dots+='<div class="result-dot '+(ok?'ok':'ng')+'"></div>';
  });
  root.innerHTML='<div class="result">'
    +'<p class="label-text">'+escapeHTML(r.label)+'</p>'
    +'<div class="score '+(passed?'pass':'fail')+'">'+pct+'%</div>'
    +'<p style="color:var(--text2);font-size:13px;margin:0 0 4px">正解 '+correct+' / '+total+' 問</p>'
    +'<p style="color:'+(passed?'var(--green)':'var(--red)')+';font-size:14px;font-weight:500">'+(passed?'合格 (基準80%以上)':'不合格 (基準80%以上)')+'</p>'
    +'<div class="result-bar">'+dots+'</div>'
    +'<div style="margin-top:24px;display:flex;gap:8px;justify-content:center">'
    +'<button class="btn primary" data-act="retry">もう一度受ける</button>'
    +'<button class="btn ghost" data-act="back">戻る</button>'
    +'</div>'
    +'</div>';
  Array.prototype.forEach.call(root.querySelectorAll('[data-act]'),function(b){b.addEventListener('click',function(){
    if(b.dataset.act==='retry'){
      STATE.mode='quiz';
      STATE.quiz={questions:r.questions,index:0,answers:[],label:r.label};
      STATE.result=null;
      render();
    }else if(b.dataset.act==='back'){
      STATE.mode='menu';
      STATE.result=null;
      render();
    }
  });});
  postHeight();
}
window.addEventListener('resize',postHeight);
})();
</script>
</body>
</html>
